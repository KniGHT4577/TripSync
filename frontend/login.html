<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login – TripSync</title>
    <meta name="description" content="Sign in to TripSync and discover solo travel companions around the world.">
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-bg-orb auth-bg-orb-1"></div>
        <div class="auth-bg-orb auth-bg-orb-2"></div>

        <div class="glass-card">
            <div class="brand-logo">
                <div class="logo-icon">✈️</div>
                <span>TripSync</span>
            </div>
            <div class="auth-title">Welcome back!</div>
            <div class="auth-subtitle">Sign in to continue your adventures</div>

            <form id="login-form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-envelope input-icon"></i>
                        <input type="email" id="email" required placeholder="you@example.com">
                    </div>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-lock input-icon"></i>
                        <input type="password" id="password" required placeholder="••••••••">
                        <button type="button" id="toggle-pw" onclick="togglePassword()" style="position:absolute;right:1rem;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-dim);width:auto;padding:0;box-shadow:none;font-size:0.9rem;" title="Toggle password">
                            <i class="fa-regular fa-eye"></i>
                        </button>
                    </div>
                </div>
                <div id="error" class="error-msg"></div>
                <button type="submit" id="submit-btn" style="margin-top:0.5rem;">
                    <i class="fa-solid fa-arrow-right-to-bracket"></i> Sign In
                </button>
            </form>

            <div class="footer-link">
                New to TripSync? <a href="signup.html">Create an account</a>
            </div>
        </div>
    </div>

    <script src="api.js"></script>
    <script>
        if (getUserId()) window.location.href = 'home.html';

        function togglePassword() {
            const pw = document.getElementById('password');
            const icon = document.querySelector('#toggle-pw i');
            if (pw.type === 'password') {
                pw.type = 'text';
                icon.className = 'fa-regular fa-eye-slash';
            } else {
                pw.type = 'password';
                icon.className = 'fa-regular fa-eye';
            }
        }

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = '';
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Signing in...';

            try {
                const res = await apiCall('/users/login', 'POST', {
                    email: document.getElementById('email').value,
                    password: document.getElementById('password').value
                });
                setUserId(res.user_id);
                if (res.name) setUsername(res.name);
                window.location.href = 'home.html';
            } catch (err) {
                errorDiv.innerHTML = `<i class="fa-solid fa-triangle-exclamation"></i> ${err.message}`;
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fa-solid fa-arrow-right-to-bracket"></i> Sign In';
            }
        });
    </script>
</body>
</html>
